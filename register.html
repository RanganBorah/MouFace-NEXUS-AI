<!DOCTYPE html>
<html>
<head>
    <title>Register Face</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            color: white;
            background:
                radial-gradient(circle at top left, rgba(16, 185, 129, 0.25), transparent 28%),
                radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.25), transparent 28%),
                linear-gradient(135deg, #0b1220, #111827, #1f2937);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.35);
            backdrop-filter: blur(16px);
            animation: fadeUp 0.8s ease;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 32px;
        }

        .subtitle {
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e5e7eb;
        }

        input {
            width: 100%;
            padding: 14px 14px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            color: white;
            outline: none;
            transition: 0.2s ease;
            font-size: 15px;
        }

        input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96,165,250,0.18);
            transform: translateY(-1px);
        }

        input::placeholder {
            color: #94a3b8;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
            box-shadow: 0 10px 24px rgba(34,197,94,0.28);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .links {
            margin-top: 18px;
            text-align: center;
        }

        .links a {
            color: #cbd5e1;
            text-decoration: none;
        }

        .links a:hover {
            color: white;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Register New Face</h1>
        <div class="subtitle">
            Enter the user details below to begin face capture and model training.
        </div>

        <form action="/capture" method="get">
            <label>Name</label>
            <input type="text" name="name" placeholder="Enter full name" required>

            <label>Age</label>
            <input type="number" name="age" placeholder="Enter age" required>

            <label>Department</label>
            <input type="text" name="dept" placeholder="Enter department" required>

            <label>Additional Info</label>
            <input type="text" name="info" placeholder="Optional information">

            <button class="btn" type="submit">Continue to Capture</button>
        </form>

        <div class="links">
            <a href="/">← Back to Home</a>
        </div>
    </div>
</body>
</html>
